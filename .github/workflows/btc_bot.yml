name: BTC Bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install pandas yfinance

      - name: Ejecutar bot BTC
        run: python docs/premium-terminal/btc_bot.py

      - name: Commit btc_data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/premium-terminal/btc_data.json
          git commit -m "update btc_data.json" || echo "sin cambios"
          git push
