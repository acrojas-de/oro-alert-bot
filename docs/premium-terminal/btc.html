<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>BTC Master Terminal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#0f172a;
    color:#e2e8f0;
    font-family:Arial;
}

.header{
    padding:20px;
    font-size:22px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-gap:20px;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

canvas{
    width:100%;
}

</style>
</head>

<body>

<div class="header">
BTC MASTER TERMINAL
</div>

<div class="grid">

<div class="card">
<h3>BTC 4H</h3>
<canvas id="btc4h"></canvas>
</div>

<div class="card">
<h3>BTC 1H</h3>
<canvas id="btc1h"></canvas>
</div>

<div class="card">
<h3>BTC 5m</h3>
<canvas id="btc5m"></canvas>
</div>

<div class="card">
<h3>BTC 1m</h3>
<canvas id="btc1m"></canvas>
</div>

</div>

<script>

async function loadBTC(){

    const r = await fetch("btc_data.json?v=" + Date.now());
    const data = await r.json();

    drawChart("btc4h", data.series["4h"]);
    drawChart("btc1h", data.series["1h"]);
    drawChart("btc5m", data.series["5m"]);
    drawChart("btc1m", data.series["1m"]);

}

function drawChart(canvasId, series){

    const prices = series.map(x => x.price);
    const ema21 = series.map(x => x.ema21);
    const ema50 = series.map(x => x.ema50);

    new Chart(
        document.getElementById(canvasId),
        {
            type: "line",
            data:{
                labels: prices.map((_,i)=>i),
                datasets:[
                    {
                        label:"Price",
                        data:prices,
                        borderColor:"#38bdf8",
                        borderWidth:2
                    },
                    {
                        label:"EMA21",
                        data:ema21,
                        borderColor:"#22c55e",
                        borderWidth:1
                    },
                    {
                        label:"EMA50",
                        data:ema50,
                        borderColor:"#f97316",
                        borderWidth:1
                    }
                ]
            },
            options:{
                responsive:true,
                plugins:{
                    legend:{display:false}
                }
            }
        }
    );
}

loadBTC();

</script>
    
</body>
</html>
